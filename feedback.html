<html lang="en">

<head>

  <link rel="canonical" href="https://www.retireabroad.info/feedback.html">
  <link rel="stylesheet" href="assets/css/styles.css">

  <style>
    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1 0 auto;
    }

    :root {
      --cta: #f1a247;
    }

    .feedback-hero {
      padding-top: 100px;
      text-align: center;
    }

    .feedback-hero h4 {
      margin: 0.3rem 0 0.2rem;
      font-weight: 900;
      letter-spacing: .01em;
    }

    .feedback-wrap {
      max-width: 100%;
      margin: 24px auto 0;
      padding: 0 16px;
      font-size: 28px;
    }

    .card-feedback {
      border-radius: 20px;
      padding: 20px 8px;
    }

    .btn-cta {
      background: var(--cta) !important;
      border-radius: 8px;
      font-weight: 800;
      text-transform: none;
      margin-top: 20px;
    }

    .btn-cta:hover {
      filter: brightness(.90);
    }

    .helper {
      font-size: .9rem;
      color: #5b6b75;
      margin-top: 20px;
    }

    .progress {
      margin: 10px 0 0;
      border-radius: 999px;
      overflow: hidden;
    }

    .title {
      color: #2f7c7f;
      font-weight: 900;
      letter-spacing: .02em;
      display: flex;
      justify-content: center;
    }

    .input-field input:focus+label,
    .input-field textarea:focus+label {
      color: #157f83 !important;
    }

    .input-field input:focus,
    .input-field textarea:focus {
      border-bottom: 1px solid #157f83 !important;
      box-shadow: 0 1px 0 0 #157f83 !important;
    }
  </style>
</head>

<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P9H6Z7XR" height="0" width="0"
      style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <!-- HEADER  -->
  <div id="global-header"></div>




  <!-- title -->
  <section class="feedback-hero">

  </section>

  <!-- FORM -->
  <main class="feedback-wrap">
    <div class="container">
      <h4 class="title">Feedback</h4>
    </div>
    <div class="card-feedback">
      <form id="feedback-form" class="feedback-form" novalidate>
        <input type="text" name="company" id="company" autocomplete="off" class="absolute -left-[9999px]" tabindex="-1"
          aria-hidden="true">

        <div class="input-field">
          <input id="email" name="email" type="email" class="validate" required aria-required="true"
            autocomplete="email" />
          <label for="email">Email</label>
          <span class="helper-text" data-error="Enter a valid email"></span>
        </div>

        <div class="input-field">
          <textarea id="feedback" name="feedback" class="materialize-textarea" data-length="1200" required
            aria-required="true" rows="6"></textarea>
          <label for="feedback">Your Feedback</label>
        </div>

        <p class="helper">
          By submitting you agree to our
          <a href="privacy_policy.html" target="_blank" rel="noopener">Privacy Policy</a>.
        </p>

        <div class="center" class="mt-4">
          <button id="submit-btn" class="btn btn-cta waves-effect">Submit</button>
        </div>

        <div id="submit-progress" class="progress" class="hidden" style="display:none">
          <div class="indeterminate"></div>
        </div>
      </form>
    </div>
  </main>

  <!-- FOOTER  -->
  <div id="global-footer"></div>


  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCUHdjd9J1pa6mEytX_b2yq89TFvFj8k-s",
      authDomain: "turing-mark-445020-k1.firebaseapp.com",
      projectId: "turing-mark-445020-k1",
      storageBucket: "turing-mark-445020-k1.firebasestorage.app",
      messagingSenderId: "551955609502",
      appId: "1:551955609502:web:cc20feee804bb1dae3488f",
    };

    // inicialize Firebase and Firestore
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>
  <!-- Materialize + form -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      M.Sidenav.init(document.querySelectorAll('.sidenav'));
      M.CharacterCounter.init(document.querySelectorAll('#feedback'));

      const form = document.getElementById('feedback-form');
      const btn = document.getElementById('submit-btn');
      const bar = document.getElementById('submit-progress');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!form.checkValidity()) {
          M.toast({ html: 'Please fill in the required fields.' });
          return;
        }
        // honeypot
        if (document.getElementById('company').value) return;

        btn.disabled = true;
        bar.style.display = 'block';

        const email = document.getElementById('email').value.trim();
        const feedback = document.getElementById('feedback').value.trim();

        const payload = {
          email: email,
          feedback: feedback,
          source: 'web-feedback',
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        };

        try {
          await db.collection('retireabroad_web_feedback').add(payload);

          M.toast({ html: 'Thanks for your feedback! 🙏' });
          form.reset();

          setTimeout(() => {
            window.location.href = 'thank_you.html';
          }, 700);
        } catch (err) {
          console.error('Firestore error:', err);
          M.toast({ html: 'Something went wrong. Please try again.' });
        } finally {
          btn.disabled = false;
          bar.style.display = 'none';
        }
      });
    });
  </script>
  <script src="assets/js/main.js"></script>
</body>

</html>
